name: caiman-cpu
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - caiman>=1.12.0
  - numpy>=1.26,<2.0       # hold at 1.x — CaImAn NumPy 2 compat not yet confirmed
  - scipy>=1.14
  - matplotlib>=3.10
  - scikit-image>=0.24
  - scikit-learn>=1.5
  - pandas>=2.2
  - h5py>=3.11
  - pytorch>=2.5
  - cpuonly
  - tqdm
  - ipython
  - ipywidgets
  - ipykernel
  - ipyparallel
  - jupyterlab
  - notebook
  - nbclassic
  - pywavelets
  - networkx
  - joblib
  - numcodecs
  - zarr
  - blosc
  - ffmpeg
  - peakutils
  - pims
  - slicerator
  - imageio
  - pywin32
  - pillow
  - pyqtgraph
  - qt-main
  - qt-webengine
  - bokeh
  - panel
  - holoviews
  - param
  - colorcet
  - pyviz_comms
  - opencv
  - eigen
  - tk
  - mkl
  - tifffile
  - pyyaml
  - ruamel.yaml
  - setuptools
  - psutil
  - pyzmq
  - tornado
  - traitlets
  - threadpoolctl
  - cellpose
  - cython
  - moviepy
  - numpydoc
  - yapf
  - darkdetect
  - fastremap
  - filelock
  - fsspec
  - future
  - imageio-ffmpeg
  - mpmath
  - natsort
  - patsy
  - pluggy
  - pystackreg
  - pytest
  - roifile
  - seaborn
  - statsmodels
  - sympy
  - pip:
      - segment-anything      # required by cellpose 4.x
      - customtkinter>=5.2
      - tkinterhtml
      - plotly>=5.0           # optional: 3-D neuron reconstruction in multi-plane review
